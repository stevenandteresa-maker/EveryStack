# Dependabot — Automated dependency updates
# See: docs/reference/compliance.md § Vulnerability Management

version: 2

updates:
  # ─── npm (pnpm) — root and all workspaces ──────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    groups:
      # Group minor/patch updates to reduce PR noise
      production-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # ─── Docker — base images in docker-compose ────────────────────────────
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker

  # ─── GitHub Actions — CI workflow actions ──────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
