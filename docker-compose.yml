# EveryStack — Development Docker Compose Stack
# Usage: docker compose up -d
# Ports are configurable via .env overrides.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: everystack-postgres
    environment:
      POSTGRES_USER: everystack
      POSTGRES_PASSWORD: everystack_dev
      POSTGRES_DB: everystack_dev
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U everystack -d everystack_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: everystack-pgbouncer
    environment:
      DATABASE_URL: postgres://everystack:everystack_dev@postgres:5432/everystack
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
      AUTH_TYPE: scram-sha-256
    ports:
      - "${PGBOUNCER_PORT:-6432}:5432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: everystack-redis
    command:
      - redis-server
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - volatile-lru
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "900 1"
      - --save
      - "300 10"
      - --save
      - "60 10000"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  realtime:
    build:
      context: .
      dockerfile: apps/realtime/Dockerfile
    container_name: everystack-realtime
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REALTIME_PORT: "3002"
      WEB_APP_URL: "http://localhost:3000"
      NODE_ENV: development
    ports:
      - "${REALTIME_PORT:-3002}:3002"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: everystack-worker
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      NODE_ENV: development
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

