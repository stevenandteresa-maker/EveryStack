# EveryStack — Development Docker Compose Stack
# Usage: docker compose up -d
# Ports are configurable via .env overrides.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: everystack-postgres
    environment:
      POSTGRES_USER: everystack
      POSTGRES_PASSWORD: everystack_dev
      POSTGRES_DB: everystack_dev
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U everystack -d everystack_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgbouncer:
    image: bitnami/pgbouncer:latest
    container_name: everystack-pgbouncer
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: everystack
      POSTGRESQL_PASSWORD: everystack_dev
      POSTGRESQL_DATABASE: everystack_dev
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "200"
      PGBOUNCER_DEFAULT_POOL_SIZE: "20"
    ports:
      - "${PGBOUNCER_PORT:-6432}:6432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: everystack-redis
    command:
      - redis-server
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - volatile-lru
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "900 1"
      - --save
      - "300 10"
      - --save
      - "60 10000"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
