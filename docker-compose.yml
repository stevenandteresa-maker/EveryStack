# EveryStack — Development Docker Compose Stack
# Usage: docker compose up -d
# Ports are configurable via .env overrides.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: everystack-postgres
    environment:
      POSTGRES_USER: everystack
      POSTGRES_PASSWORD: everystack_dev
      POSTGRES_DB: everystack_dev
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U everystack -d everystack_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: everystack-pgbouncer
    environment:
      DATABASE_URL: postgres://everystack:everystack_dev@postgres:5432/everystack
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
      AUTH_TYPE: scram-sha-256
    ports:
      - "${PGBOUNCER_PORT:-6432}:5432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: everystack-redis
    command:
      - redis-server
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - volatile-lru
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "900 1"
      - --save
      - "300 10"
      - --save
      - "60 10000"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: everystack-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: everystack-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/everystack-dev;
      exit 0;
      "

  realtime:
    build:
      context: .
      dockerfile: apps/realtime/Dockerfile
    container_name: everystack-realtime
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REALTIME_PORT: "3002"
      WEB_APP_URL: "http://localhost:3000"
      NODE_ENV: development
    ports:
      - "${REALTIME_PORT:-3002}:3002"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: everystack-worker
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      NODE_ENV: development
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  clamav:
    image: clamav/clamav:latest
    container_name: everystack-clamav
    profiles:
      - scanning
    ports:
      - "${CLAMAV_PORT:-3310}:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck || true"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clamav_data:

